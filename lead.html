<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEAD Model Calculator — InPursuit Health</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="padding: 100px 10%; background: var(--navy); color: white; text-align: center;">
        <h1 style="font-family:'Instrument Serif'; font-size: 3rem;">LEAD Model Projection</h1>
        <p style="color: var(--gold);">Long-term Enhanced ACO Design</p>
    </div>

    <div style="max-width: 900px; margin: -50px auto 50px; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-top: 5px solid var(--gold);">
        <h2 style="color:var(--navy);">Calculate Your Surplus</h2>
        <div style="margin-top:20px;">
            <label>Number of Beneficiaries:</label>
            <input type="number" id="benes" value="5000" style="width:100%; padding:10px; margin:10px 0;">
            <button onclick="calculateLead()" class="btn-primary">Generate Projection</button>
        </div>
        <div id="result" style="margin-top:30px; padding:20px; background:var(--cream); border-radius:5px; display:none;">
            <h3 style="color:var(--navy);">Estimated Year 1 Surplus: <span id="surplus-gold" style="color:var(--gold);">$0</span></h3>
        </div>
    </div>

    <script>
        function calculateLead() {
            const benes = document.getElementById('benes').value;
            const surplus = benes * 450; // Simplified logic for demo
            document.getElementById('surplus-gold').innerText = "$" + surplus.toLocaleString();
            document.getElementById('result').style.display = "block";
        }
    </script>
    <script src="nav.js"></script>
</body>
</html>
