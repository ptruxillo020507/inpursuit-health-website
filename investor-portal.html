

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investor Portal — InPursuit Health</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        #gate { height: 80vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 8px; border-top: 5px solid var(--gold); box-shadow: var(--shadow); width: 100%; max-width: 400px; }
        #portal { display: none; padding: 40px 5%; }
        .sidebar { width: 250px; background: white; border-radius: 8px; padding: 20px; border: 1px solid var(--gold); }
        .doc-viewer { flex-grow: 1; background: white; margin-left: 30px; border-radius: 8px; min-height: 600px; border: 1px solid var(--gold); }
        .active-doc { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>
    <div id="gate">
        <div class="login-box">
            <h2 style="font-family:'Instrument Serif'; color:var(--navy); margin-bottom:20px;">Investor Login</h2>
            <input type="text" id="access-code" placeholder="Enter Access Code" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ddd;">
            <button onclick="unlockPortal()" class="btn-primary" style="width:100%;">Access Portal</button>
        </div>
    </div>

    <div id="portal" style="display:none; flex-direction: row;">
        <div class="sidebar">
            <h3 style="color:var(--navy); margin-bottom:15px;">Documents</h3>
            <ul style="list-style:none; padding:0;">
                <li style="padding:10px 0; border-bottom:1px solid #eee; cursor:pointer;" onclick="showDoc('exec-summary')">Executive Summary</li>
                <li style="padding:10px 0; border-bottom:1px solid #eee; cursor:pointer;" onclick="showDoc('financials')">Financial Projections</li>
            </ul>
        </div>
        <div class="doc-viewer" id="doc-content">
            <div style="padding:100px; text-align:center; color:#999;">Select a document to view</div>
        </div>
    </div>

    <script>
        function unlockPortal() {
            const code = document.getElementById('access-code').value;
            if(code === "IPH2026") { // Example code
                document.getElementById('gate').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
            } else {
                alert("Invalid Code");
            }
        }
        function showDoc(type) {
            document.getElementById('doc-content').innerHTML = `<div style="padding:40px;"><h2>${type.replace('-', ' ').toUpperCase()}</h2><p>Loading secure document viewer...</p></div>`;
        }
    </script>
    <script src="nav.js"></script>
</body>
</html>
